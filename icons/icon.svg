<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="70%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#b3001b"/>
    </radialGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f1f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- main badge -->
  <circle cx="64" cy="64" r="58" fill="url(#bg)" stroke="#7a0014" stroke-width="3"/>
  <circle cx="64" cy="64" r="50" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- prohibition bar (diagonal) -->
  <g filter="url(#shadow)">
    <rect x="20" y="56" width="88" height="16" rx="6" ry="6"
          fill="url(#bar)" transform="rotate(-45 64 64)"/>
  </g>

  <!-- subtle top highlight -->
  <ellipse cx="64" cy="34" rx="40" ry="14" fill="rgba(255,255,255,0.18)"/>
</svg>
