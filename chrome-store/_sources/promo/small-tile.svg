  </defs>

  <rect width="440" height="280" fill="url(#bg)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
    <!-- mascot -->
    <g transform="translate(28, 60) scale(0.7)">
