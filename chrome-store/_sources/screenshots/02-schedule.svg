<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <radialGradient id="bg" cx="70%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#1e1418"/>
      <stop offset="100%" stop-color="#0d0e11"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a8aab0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7c7c"/>
      <stop offset="100%" stop-color="#e63946"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <g opacity="0.15">
    <ellipse cx="1380" cy="200" rx="500" ry="120" fill="#e63946" transform="rotate(-12 1380 200)"/>
    <ellipse cx="-100" cy="700" rx="500" ry="100" fill="#e63946" transform="rotate(-15 -100 700)"/>
  </g>

  <!-- LEFT TEXT -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
    <text x="80" y="240" font-size="14" font-weight="600" fill="#ff9aa3" letter-spacing="3">02 · SCHEDULE</text>

    <text x="80" y="340" font-size="76" font-weight="800" fill="url(#titleGrad)" letter-spacing="-2">Schedule</text>
    <text x="80" y="416" font-size="76" font-weight="800" fill="url(#accentGrad)" letter-spacing="-2">when to focus.</text>

    <text x="80" y="488" font-size="20" font-weight="400" fill="#9aa0aa">Three modes per range: always, block during,</text>
    <text x="80" y="516" font-size="20" font-weight="400" fill="#9aa0aa">or allow during. Pick days + time. Done.</text>

    <g transform="translate(80, 580)" font-size="15" fill="#c4c8ce">
      <g transform="translate(0, 0)">
        <rect width="200" height="32" rx="16" fill="#20232a" stroke="#2a2e36"/>
        <circle cx="18" cy="16" r="4" fill="#5cb85c"/>
        <text x="32" y="21" font-weight="500">Mon-Fri · 09:00-18:00</text>
      </g>
      <g transform="translate(214, 0)">
        <rect width="180" height="32" rx="16" fill="#20232a" stroke="#2a2e36"/>
        <circle cx="18" cy="16" r="4" fill="#5cb85c"/>
        <text x="32" y="21" font-weight="500">Sat-Sun · 10:00-14:00</text>
      </g>
    </g>
  </g>

  <!-- RIGHT PANEL MOCKUP -->
  <g transform="translate(820, 60)">
    <rect width="400" height="680" rx="20" fill="#16181c" stroke="#2a2e36" stroke-width="1"/>

    <!-- header -->
    <rect width="400" height="72" rx="20" fill="#1e2127"/>
    <rect y="40" width="400" height="32" fill="#1e2127"/>
    <line x1="0" y1="72" x2="400" y2="72" stroke="#2a2e36"/>

    <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
      <text x="22" y="42" font-size="16" font-weight="600" fill="#e9eaec">Distract Blocker</text>

      <!-- status card -->
      <g transform="translate(20, 100)">
        <rect width="360" height="80" rx="14" fill="#20232a" stroke="#e63946" stroke-width="1.4"/>
        <text x="18" y="28" font-size="11" font-weight="600" fill="#9aa0aa" letter-spacing="0.5">BLOCKING</text>
        <text x="18" y="58" font-size="22" font-weight="700" fill="#ff7c7c">on</text>
        <text x="18" y="74" font-size="10" font-weight="600" fill="#888888" letter-spacing="0.5">IDLE NOW</text>
        <rect x="290" y="26" width="50" height="28" rx="14" fill="#e63946"/>
        <circle cx="324" cy="40" r="11" fill="#fff"/>
      </g>

      <!-- schedule section -->
      <g transform="translate(20, 200)">
        <text x="0" y="0" font-size="13" font-weight="600" fill="#9aa0aa" letter-spacing="1">SCHEDULE</text>

        <!-- mode switch -->
        <g transform="translate(0, 14)">
          <rect width="360" height="38" rx="8" fill="#1e2127" stroke="#2a2e36"/>
          <text x="61" y="24" text-anchor="middle" font-size="12" font-weight="500" fill="#9aa0aa">Always</text>
          <rect x="123" y="3" width="116" height="32" rx="6" fill="#20232a"/>
          <text x="181" y="24" text-anchor="middle" font-size="12" font-weight="600" fill="#e9eaec">Block during</text>
          <text x="300" y="24" text-anchor="middle" font-size="12" font-weight="500" fill="#9aa0aa">Allow during</text>
        </g>

        <!-- range 1 -->
        <g transform="translate(0, 68)">
          <rect width="360" height="90" rx="10" fill="#1e2127" stroke="#2a2e36"/>

          <!-- times row -->
          <rect x="12" y="12" width="120" height="32" rx="6" fill="#16181c" stroke="#2a2e36"/>
          <text x="72" y="33" text-anchor="middle" font-size="14" font-family="ui-monospace, Menlo, monospace" fill="#e9eaec">09:00</text>
          <text x="146" y="33" text-anchor="middle" font-size="14" fill="#9aa0aa">–</text>
          <rect x="160" y="12" width="120" height="32" rx="6" fill="#16181c" stroke="#2a2e36"/>
          <text x="220" y="33" text-anchor="middle" font-size="14" font-family="ui-monospace, Menlo, monospace" fill="#e9eaec">18:00</text>
          <text x="328" y="33" text-anchor="middle" font-size="20" fill="#5d6168">×</text>

          <!-- day chips (Mon-Fri active) -->
          <g transform="translate(12, 54)" font-size="11" font-weight="500">
            <rect width="44" height="26" rx="6" fill="#e63946"/>
            <text x="22" y="17" text-anchor="middle" fill="#fff">Mon</text>
            <g transform="translate(48, 0)"><rect width="44" height="26" rx="6" fill="#e63946"/><text x="22" y="17" text-anchor="middle" fill="#fff">Tue</text></g>
            <g transform="translate(96, 0)"><rect width="44" height="26" rx="6" fill="#e63946"/><text x="22" y="17" text-anchor="middle" fill="#fff">Wed</text></g>
            <g transform="translate(144, 0)"><rect width="44" height="26" rx="6" fill="#e63946"/><text x="22" y="17" text-anchor="middle" fill="#fff">Thu</text></g>
            <g transform="translate(192, 0)"><rect width="44" height="26" rx="6" fill="#e63946"/><text x="22" y="17" text-anchor="middle" fill="#fff">Fri</text></g>
            <g transform="translate(240, 0)"><rect width="44" height="26" rx="6" fill="#16181c" stroke="#2a2e36"/><text x="22" y="17" text-anchor="middle" fill="#9aa0aa">Sat</text></g>
            <g transform="translate(288, 0)"><rect width="44" height="26" rx="6" fill="#16181c" stroke="#2a2e36"/><text x="22" y="17" text-anchor="middle" fill="#9aa0aa">Sun</text></g>
          </g>
        </g>

        <!-- range 2 -->
        <g transform="translate(0, 170)">
          <rect width="360" height="90" rx="10" fill="#1e2127" stroke="#2a2e36"/>
          <rect x="12" y="12" width="120" height="32" rx="6" fill="#16181c" stroke="#2a2e36"/>
          <text x="72" y="33" text-anchor="middle" font-size="14" font-family="ui-monospace, Menlo, monospace" fill="#e9eaec">10:00</text>
          <text x="146" y="33" text-anchor="middle" font-size="14" fill="#9aa0aa">–</text>
          <rect x="160" y="12" width="120" height="32" rx="6" fill="#16181c" stroke="#2a2e36"/>
          <text x="220" y="33" text-anchor="middle" font-size="14" font-family="ui-monospace, Menlo, monospace" fill="#e9eaec">14:00</text>
          <text x="328" y="33" text-anchor="middle" font-size="20" fill="#5d6168">×</text>
          <g transform="translate(12, 54)" font-size="11" font-weight="500">
            <g transform="translate(0, 0)"><rect width="44" height="26" rx="6" fill="#16181c" stroke="#2a2e36"/><text x="22" y="17" text-anchor="middle" fill="#9aa0aa">Mon</text></g>
            <g transform="translate(48, 0)"><rect width="44" height="26" rx="6" fill="#16181c" stroke="#2a2e36"/><text x="22" y="17" text-anchor="middle" fill="#9aa0aa">Tue</text></g>
            <g transform="translate(96, 0)"><rect width="44" height="26" rx="6" fill="#16181c" stroke="#2a2e36"/><text x="22" y="17" text-anchor="middle" fill="#9aa0aa">Wed</text></g>
            <g transform="translate(144, 0)"><rect width="44" height="26" rx="6" fill="#16181c" stroke="#2a2e36"/><text x="22" y="17" text-anchor="middle" fill="#9aa0aa">Thu</text></g>
            <g transform="translate(192, 0)"><rect width="44" height="26" rx="6" fill="#16181c" stroke="#2a2e36"/><text x="22" y="17" text-anchor="middle" fill="#9aa0aa">Fri</text></g>
            <g transform="translate(240, 0)"><rect width="44" height="26" rx="6" fill="#e63946"/><text x="22" y="17" text-anchor="middle" fill="#fff">Sat</text></g>
            <g transform="translate(288, 0)"><rect width="44" height="26" rx="6" fill="#e63946"/><text x="22" y="17" text-anchor="middle" fill="#fff">Sun</text></g>
          </g>
        </g>

        <!-- add range button -->
        <g transform="translate(0, 272)">
          <rect width="360" height="40" rx="8" fill="none" stroke="#5d6168" stroke-width="1" stroke-dasharray="4 4"/>
          <text x="180" y="26" text-anchor="middle" font-size="13" fill="#9aa0aa">+ Add range</text>
        </g>
      </g>
    </g>
  </g>
</svg>
