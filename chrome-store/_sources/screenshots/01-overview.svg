<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#1e1418"/>
      <stop offset="100%" stop-color="#0d0e11"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ff7c7c"/>
      <stop offset="70%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#b3001b"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a8aab0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7c7c"/>
      <stop offset="100%" stop-color="#e63946"/>
    </linearGradient>
    <linearGradient id="pillBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a1e22"/>
      <stop offset="100%" stop-color="#20232a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>

  <!-- left floating shape -->
  <g opacity="0.18">
    <ellipse cx="-100" cy="200" rx="500" ry="100" fill="#e63946" transform="rotate(-15 -100 200)"/>
  </g>
  <g opacity="0.15">
    <ellipse cx="1380" cy="650" rx="500" ry="120" fill="#e63946" transform="rotate(-12 1380 650)"/>
  </g>

  <!-- LEFT TEXT AREA -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
    <!-- badge -->
    <g transform="translate(80, 200)">
      <rect width="220" height="32" rx="16" fill="url(#pillBg)" stroke="#7a0014" stroke-width="1"/>
      <circle cx="20" cy="16" r="4" fill="#e63946"/>
      <text x="34" y="21" font-size="11" font-weight="600" fill="#ff9aa3" letter-spacing="2.6">CHROME EXTENSION</text>
    </g>

    <!-- headline -->
    <text x="80" y="320" font-size="76" font-weight="800" fill="url(#titleGrad)" letter-spacing="-2">Block distracting</text>
    <text x="80" y="396" font-size="76" font-weight="800" fill="url(#accentGrad)" letter-spacing="-2">sites. Quietly.</text>

    <!-- subtitle -->
    <text x="80" y="468" font-size="20" font-weight="400" fill="#9aa0aa">A focused Chrome extension. One side panel,</text>
    <text x="80" y="496" font-size="20" font-weight="400" fill="#9aa0aa">a guardian mascot, and 21 languages.</text>

    <!-- bullet list -->
    <g transform="translate(80, 560)" font-size="16" fill="#c4c8ce">
      <g transform="translate(0, 0)">
        <circle cx="6" cy="-5" r="3" fill="#e63946"/>
        <text x="20" y="0" font-weight="500">Side panel · toggle · custom shortcut</text>
      </g>
      <g transform="translate(0, 36)">
        <circle cx="6" cy="-5" r="3" fill="#e63946"/>
        <text x="20" y="0" font-weight="500">Schedule with day-of-week ranges</text>
      </g>
      <g transform="translate(0, 72)">
        <circle cx="6" cy="-5" r="3" fill="#e63946"/>
        <text x="20" y="0" font-weight="500">No tracking · no remote code · MIT</text>
      </g>
    </g>
  </g>

  <!-- RIGHT SIDE PANEL MOCKUP -->
  <g transform="translate(820, 60)">
    <rect width="400" height="680" rx="20" fill="#16181c" stroke="#2a2e36" stroke-width="1"/>

    <!-- header bar -->
    <rect width="400" height="72" rx="20" fill="#1e2127"/>
    <rect y="40" width="400" height="32" fill="#1e2127"/>
    <line x1="0" y1="72" x2="400" y2="72" stroke="#2a2e36"/>

    <!-- mascot in header -->
    <g transform="translate(18, 12) scale(0.22)">
      <ellipse cx="100" cy="200" rx="56" ry="6" fill="rgba(0,0,0,0.3)"/>
      <circle cx="100" cy="105" r="72" fill="url(#bodyGrad)" stroke="#7a0014" stroke-width="2"/>
      <ellipse cx="100" cy="58" rx="38" ry="13" fill="rgba(255,255,255,0.25)"/>
      <ellipse cx="100" cy="120" rx="50" ry="38" fill="#fff5f5"/>
      <circle cx="78" cy="108" r="10" fill="#1a1c1f"/>
      <circle cx="80" cy="105" r="3" fill="#fff"/>
      <circle cx="122" cy="108" r="10" fill="#1a1c1f"/>
      <circle cx="124" cy="105" r="3" fill="#fff"/>
      <path d="M 86 138 Q 100 150 114 138" stroke="#1a1c1f" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 140 130 Q 140 118 152 116 Q 164 118 164 130 Q 164 146 152 152 Q 140 146 140 130 Z" fill="#fff" stroke="#7a0014" stroke-width="2"/>
      <circle cx="152" cy="132" r="6" fill="none" stroke="#e63946" stroke-width="2.4"/>
      <line x1="148" y1="136" x2="156" y2="128" stroke="#e63946" stroke-width="2.4" stroke-linecap="round"/>
    </g>

    <!-- title -->
    <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
      <text x="78" y="36" font-size="15" font-weight="600" fill="#e9eaec">Distract Blocker</text>
      <text x="78" y="55" font-size="12" fill="#9aa0aa">Fewer distractions</text>

      <!-- header icons -->
      <rect x="298" y="20" width="36" height="32" rx="8" fill="#20232a" stroke="#2a2e36"/>
      <text x="316" y="41" font-size="14" fill="#9aa0aa" text-anchor="middle">⌥</text>
      <rect x="342" y="20" width="36" height="32" rx="8" fill="#20232a" stroke="#2a2e36"/>
      <circle cx="360" cy="36" r="8" fill="none" stroke="#9aa0aa" stroke-width="1.4"/>
      <line x1="352" y1="36" x2="368" y2="36" stroke="#9aa0aa" stroke-width="1.4"/>
      <path d="M 360 28 Q 364 36 360 44 Q 356 36 360 28 Z" fill="none" stroke="#9aa0aa" stroke-width="1.4"/>

      <!-- status card (ON, glowing) -->
      <g transform="translate(20, 100)">
        <rect width="360" height="80" rx="14" fill="url(#pillBg)" stroke="#e63946" stroke-width="1.4"/>
        <text x="18" y="28" font-size="11" font-weight="600" fill="#9aa0aa" letter-spacing="0.5">BLOCKING</text>
        <text x="18" y="58" font-size="22" font-weight="700" fill="#ff7c7c">on</text>
        <text x="18" y="74" font-size="10" font-weight="600" fill="#e63946" letter-spacing="0.5">BLOCKING NOW</text>

        <!-- iOS toggle -->
        <rect x="290" y="26" width="50" height="28" rx="14" fill="#e63946"/>
        <circle cx="324" cy="40" r="11" fill="#fff"/>
      </g>

      <!-- schedule pill -->
      <g transform="translate(20, 200)">
        <text x="0" y="0" font-size="11" font-weight="600" fill="#9aa0aa" letter-spacing="0.5">SCHEDULE</text>
        <g transform="translate(0, 12)">
          <rect width="360" height="36" rx="8" fill="#1e2127" stroke="#2a2e36"/>
          <rect x="3" y="3" width="116" height="30" rx="6" fill="#20232a"/>
          <text x="61" y="23" text-anchor="middle" font-size="12" font-weight="500" fill="#9aa0aa">Always</text>
          <text x="180" y="23" text-anchor="middle" font-size="12" font-weight="600" fill="#e9eaec">Block during</text>
          <text x="299" y="23" text-anchor="middle" font-size="12" font-weight="500" fill="#9aa0aa">Allow during</text>
        </g>
      </g>

      <!-- sites section -->
      <g transform="translate(20, 308)">
        <text x="0" y="0" font-size="11" font-weight="600" fill="#9aa0aa" letter-spacing="0.5">BLOCKED SITES</text>
        <g transform="translate(110, -10)">
          <rect width="26" height="18" rx="9" fill="#20232a"/>
          <text x="13" y="13" text-anchor="middle" font-size="11" fill="#9aa0aa">8</text>
        </g>

        <!-- input -->
        <g transform="translate(0, 14)">
          <rect width="312" height="38" rx="8" fill="#20232a" stroke="#2a2e36"/>
          <text x="14" y="24" font-size="13" fill="#5d6168" font-family="ui-monospace, Menlo, monospace">example.com</text>
          <rect x="320" y="0" width="40" height="38" rx="8" fill="#e63946"/>
          <text x="340" y="26" text-anchor="middle" font-size="20" font-weight="600" fill="#fff">＋</text>
        </g>

        <!-- list items -->
        <g transform="translate(0, 66)" font-family="ui-monospace, Menlo, monospace" font-size="13">
          <rect width="360" height="40" rx="8" fill="#1e2127" stroke="#2a2e36"/>
          <text x="14" y="25" fill="#e9eaec">youtube.com</text>
          <text x="346" y="25" text-anchor="end" font-size="18" fill="#5d6168">×</text>
        </g>
        <g transform="translate(0, 112)" font-family="ui-monospace, Menlo, monospace" font-size="13">
          <rect width="360" height="40" rx="8" fill="#1e2127" stroke="#2a2e36"/>
          <text x="14" y="25" fill="#e9eaec">facebook.com</text>
          <text x="346" y="25" text-anchor="end" font-size="18" fill="#5d6168">×</text>
        </g>
        <g transform="translate(0, 158)" font-family="ui-monospace, Menlo, monospace" font-size="13">
          <rect width="360" height="40" rx="8" fill="#1e2127" stroke="#2a2e36"/>
          <text x="14" y="25" fill="#e9eaec">instagram.com</text>
          <text x="346" y="25" text-anchor="end" font-size="18" fill="#5d6168">×</text>
        </g>
        <g transform="translate(0, 204)" font-family="ui-monospace, Menlo, monospace" font-size="13">
          <rect width="360" height="40" rx="8" fill="#1e2127" stroke="#2a2e36"/>
          <text x="14" y="25" fill="#e9eaec">tiktok.com</text>
          <text x="346" y="25" text-anchor="end" font-size="18" fill="#5d6168">×</text>
        </g>
        <g transform="translate(0, 250)" font-family="ui-monospace, Menlo, monospace" font-size="13">
          <rect width="360" height="40" rx="8" fill="#1e2127" stroke="#2a2e36"/>
          <text x="14" y="25" fill="#e9eaec">reddit.com</text>
          <text x="346" y="25" text-anchor="end" font-size="18" fill="#5d6168">×</text>
        </g>
      </g>
    </g>
  </g>
</svg>
